<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varshitap 2026-27 | Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Noto+Sans+Gujarati:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --maroon: #7B1113; --ivory: #FCF9F2; --gold: #C5A059; }
        body { font-family: 'Poppins', sans-serif; background: var(--ivory); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .mantra { text-align: center; font-family: 'Noto Sans Gujarati', sans-serif; color: var(--maroon); font-size: 14px; font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid var(--gold); padding-bottom: 8px; width: 100%; max-width: 600px; }
        .card { background: #fff; width: 100%; max-width: 550px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--maroon); padding: 40px 30px; box-sizing: border-box; }
        h1 { font-family: 'Merriweather', serif; color: var(--maroon); text-align: center; margin: 0 0 20px; font-size: 24px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; }
        label span { display: block; font-family: 'Noto Sans Gujarati', sans-serif; color: var(--maroon); font-size: 15px; text-transform: none; }
        input, select { width: 100%; padding: 10px 0; border: none; border-bottom: 2px solid #EEE; font-size: 16px; outline: none; background: transparent; }
        input:focus, select:focus { border-bottom-color: var(--gold); }
        .radio-container { display: flex; gap: 10px; margin-top: 10px; }
        .radio-btn { flex: 1; text-align: center; border: 1px solid #EEE; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .radio-btn input { display: none; }
        .radio-btn:has(input:checked) { background: var(--maroon); color: white; border-color: var(--maroon); }
        .btn { width: 100%; padding: 16px; background: var(--maroon); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn:hover { opacity: 0.9; }
        #success-ui { display: none; text-align: center; }
        .success-icon { font-size: 60px; margin-bottom: 20px; display: block; }
    </style>
</head>
<body>
    <div class="mantra">શ્રી ચંદ્રપ્રભ સ્વામિ ને નમઃ • શ્રી આિદનાથાય નમઃ • નમો નમઃ શ્રી ગુરુ નેિમસૂરયે</div>

    <div class="card" id="form-container">
        <h1>VARSHITAP 2026-27</h1>
        <form id="vForm">
            <div class="input-group"><label><span>પૂરું નામ</span> Full Name *</label><input type="text" name="fullName" required></div>
            <div class="input-group"><label><span>મોબાઇલ નંબર</span> Mobile Number *</label><input type="tel" name="mobile" pattern="[0-9]{10}" placeholder="10-digit number" required></div>
            <div class="input-group"><label><span>જન્મ તારીખ</span> Date of Birth *</label><input type="date" name="dob" required></div>
            <div class="input-group"><label><span>ફોર્મ નંબર</span> Form Number *</label><input type="text" name="formNumber" required></div>
            <div class="input-group">
                <label><span>ઋષભ શત્રુંજય તપ</span> Rushabh Shatrunjay Tap *</label>
                <div class="radio-container">
                    <label class="radio-btn"><input type="radio" name="tapType" value="YES" required> YES / હા</label>
                    <label class="radio-btn"><input type="radio" name="tapType" value="NO"> NO / ના</label>
                </div>
            </div>
            <div class="input-group">
                <label><span>સમય પસંદગી</span> Biyashana Slot Selection *</label>
                <select name="slot" required>
                    <option value="" disabled selected>Select Slot</option>
                    <option value="8.00-8.45 AM (Down)">8.00-8.45 AM (Down)</option>
                    <option value="8.00-8.45 AM (Chair)">8.00-8.45 AM (Chair)</option>
                    <option value="9.00-9.45 AM (Down)">9.00-9.45 AM (Down)</option>
                    <option value="9.00-9.45 AM (Chair)">9.00-9.45 AM (Chair)</option>
                </select>
            </div>
            <button type="submit" class="btn" id="sBtn">Submit Registration</button>
        </form>
    </div>

    <div class="card" id="success-ui">
        <span class="success-icon">🙏</span>
        <h2 style="color: var(--maroon); margin-top: 0;">Submission Successful</h2>
        <p>તમારો પ્રતિસાદ સફળતાપૂર્વક રેકોર્ડ કરવામાં આવ્યો છે.</p>
        <p style="color: #666;">Thank you for registering for the Varshitap 2026-27 program.</p>
        <button class="btn" onclick="location.reload()" style="background: transparent; border: 1px solid var(--maroon); color: var(--maroon);">Submit Another Response</button>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxGqXCN2HtF67ImqlAduW1ooJv5DyRQ_3qdaaNibeeS5tnTSA2bj8si1EhZFabvR__r/exec';
        const form = document.getElementById('vForm');

        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('sBtn');
            btn.disabled = true;
            btn.innerText = "Submitting...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    document.getElementById('form-container').style.display = 'none';
                    document.getElementById('success-ui').style.display = 'block';
                    window.scrollTo(0, 0);
                })
                .catch(error => {
                    alert("Submission failed. Please check your internet connection.");
                    btn.disabled = false;
                    btn.innerText = "Submit Registration";
                });
        });
    </script>
</body>
</html>
