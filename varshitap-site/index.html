<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varshitap 2026-27</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Noto+Sans+Gujarati:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --maroon: #7B1113; --ivory: #FCF9F2; --gold: #C5A059; }
        body { font-family: 'Poppins', sans-serif; background: var(--ivory); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .mantra { text-align: center; font-family: 'Noto Sans Gujarati', sans-serif; color: var(--maroon); font-size: 14px; font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid var(--gold); padding-bottom: 8px; width: 100%; max-width: 600px; }
        .card { background: #fff; width: 100%; max-width: 550px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--maroon); padding: 30px; box-sizing: border-box; }
        h1 { font-family: 'Merriweather', serif; color: var(--maroon); text-align: center; margin: 0 0 20px; font-size: 24px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; font-weight: 600; }
        label span { display: block; font-family: 'Noto Sans Gujarati', sans-serif; color: var(--maroon); font-size: 15px; }
        input, select { width: 100%; padding: 10px 0; border: none; border-bottom: 2px solid #EEE; font-size: 16px; outline: none; background: transparent; }
        .radio-container { display: flex; gap: 10px; margin-top: 10px; }
        .radio-btn { flex: 1; text-align: center; border: 1px solid #EEE; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .radio-btn input { display: none; }
        .radio-btn:has(input:checked) { background: var(--maroon); color: white; border-color: var(--maroon); }
        .btn { width: 100%; padding: 16px; background: var(--maroon); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        #success-ui { display: none; text-align: center; padding: 40px 0; }
        #pass-preview { width: 350px; background: #fff; border: 2px solid var(--gold); border-radius: 15px; padding: 25px; text-align: center; position: absolute; left: -9999px; }
        .pass-title { font-size: 22px; color: var(--maroon); font-weight: 700; border-bottom: 2px solid var(--maroon); padding-bottom: 10px; margin-bottom: 15px; }
        #qrcode { display: flex; justify-content: center; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="mantra">શ્રી ચંદ્રપ્રભ સ્વામિ ને નમઃ • શ્રી આદિનાથાય નમઃ • નમો નમઃ શ્રી ગુરુ નેમિસૂરયે</div>
    <div class="card" id="form-container">
        <h1>VARSHITAP 2026-27</h1>
        <form id="vForm">
            <div class="input-group"><label><span>પૂરું નામ</span> Full Name *</label><input type="text" id="in_name" name="fullName" required></div>
            <div class="input-group"><label><span>મોબાઇલ નંબર</span> Mobile Number *</label><input type="tel" id="in_mobile" name="mobile" pattern="[0-9]{10}" required></div>
            <div class="input-group"><label><span>જન્મ તારીખ</span> Date of Birth *</label><input type="date" name="dob" required></div>
            <div class="input-group"><label><span>ફોર્મ નંબર</span> Form Number *</label><input type="text" id="in_form" name="formNumber" required></div>
            <div class="input-group">
                <label><span>ઋષભ શત્રુંજય તપ</span> Rushabh Shatrunjay Tap *</label>
                <div class="radio-container">
                    <label class="radio-btn"><input type="radio" name="tapType" value="YES" required> YES / હા</label>
                    <label class="radio-btn"><input type="radio" name="tapType" value="NO"> NO / ના</label>
                </div>
            </div>
            <div class="input-group">
                <label><span>સમય પસંદગી</span> Biyashana Slot Selection *</label>
                <select id="in_slot" name="slot" required>
                    <option value="" disabled selected>Select Slot</option>
                    <option value="8.00-8.45 AM (Down)">8.00-8.45 AM (Down)</option>
                    <option value="8.00-8.45 AM (Chair)">8.00-8.45 AM (Chair)</option>
                    <option value="9.00-9.45 AM (Down)">9.00-9.45 AM (Down)</option>
                    <option value="9.00-9.45 AM (Chair)">9.00-9.45 AM (Chair)</option>
                </select>
            </div>
            <button type="submit" class="btn" id="sBtn">Submit & Get Pass</button>
        </form>
    </div>

    <div class="card" id="success-ui">
        <h2>🙏 Recorded Successfully</h2>
        <button class="btn" id="downloadPass">SAVE PASS TO GALLERY</button>
    </div>

    <div id="pass-preview">
        <div class="pass-title">VARSHITAP 2026-27</div>
        <div id="qrcode"></div>
        <div style="text-align: left; font-size: 14px;">
            <p><strong>NAME:</strong> <span id="p_name"></span></p>
            <p><strong>FORM NO:</strong> <span id="p_form"></span></p>
            <p><strong>SLOT:</strong> <span id="p_slot" style="color:var(--maroon)"></span></p>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxGqXCN2HtF67ImqlAduW1ooJv5DyRQ_3qdaaNibeeS5tnTSA2bj8si1EhZFabvR__r/exec';
        const form = document.getElementById('vForm');

        form.addEventListener('submit', e => {
            e.preventDefault();
            document.getElementById('sBtn').innerText = "Registering...";
            const formNo = document.getElementById('in_form').value;
            const verifyLink = window.location.href.split('index.html')[0] + "verify?id=" + formNo;
            
            document.getElementById('p_name').innerText = document.getElementById('in_name').value;
            document.getElementById('p_form').innerText = formNo;
            document.getElementById('p_slot').innerText = document.getElementById('in_slot').options[document.getElementById('in_slot').selectedIndex].text;
            
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: verifyLink, width: 150, height: 150 });

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(() => {
                    document.getElementById('form-container').style.display = 'none';
                    document.getElementById('success-ui').style.display = 'block';
                });
        });

        document.getElementById('downloadPass').addEventListener('click', () => {
            const pass = document.getElementById('pass-preview');
            pass.style.position = "static"; pass.style.left = "0";
            html2canvas(pass).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Pass_' + document.getElementById('in_form').value + '.png';
                link.href = canvas.toDataURL(); link.click();
                pass.style.position = "absolute"; pass.style.left = "-9999px";
            });
        });
    </script>
</body>
</html>
