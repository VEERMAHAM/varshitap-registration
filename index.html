<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varshitap 2026-27 | Official Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Noto+Sans+Gujarati:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --spiritual-maroon: #7B1113; --soft-ivory: #FCF9F2; --accent-gold: #C5A059; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--soft-ivory); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .mantra-header { text-align: center; font-family: 'Noto Sans Gujarati', sans-serif; color: var(--spiritual-maroon); font-size: 14px; font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid var(--accent-gold); padding-bottom: 8px; width: 100%; max-width: 600px; }
        .main-wrapper { background: #ffffff; width: 100%; max-width: 600px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--spiritual-maroon); overflow: hidden; }
        .hero-banner { padding: 40px 20px; text-align: center; }
        h1 { font-family: 'Merriweather', serif; color: var(--spiritual-maroon); margin: 0; font-size: 28px; }
        .form-section { padding: 0 30px 40px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 600; color: #666; margin-bottom: 5px; }
        label span { display: block; font-family: 'Noto Sans Gujarati', sans-serif; font-size: 15px; color: var(--spiritual-maroon); }
        input, select { width: 100%; padding: 10px 0; border: none; border-bottom: 2px solid #EEE; font-size: 16px; outline: none; background: transparent; }
        .radio-container { display: flex; gap: 10px; margin-top: 10px; }
        .radio-btn { flex: 1; text-align: center; border: 1px solid #EEE; padding: 10px; border-radius: 6px; cursor: pointer; }
        .radio-btn input { display: none; }
        .radio-btn:has(input:checked) { background: var(--spiritual-maroon); color: white; }
        .submit-btn, .download-btn { width: 100%; padding: 16px; background: var(--spiritual-maroon); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 20px; }

        /* PASS DESIGN */
        #pass-preview { width: 350px; background: #fff; border: 2px solid var(--accent-gold); border-radius: 15px; padding: 25px; text-align: center; position: absolute; left: -9999px; }
        .pass-header { border-bottom: 2px solid var(--spiritual-maroon); padding-bottom: 10px; margin-bottom: 15px; }
        .pass-title { font-size: 22px; color: var(--spiritual-maroon); font-weight: 700; margin-top: 5px; }
        .pass-detail { margin: 8px 0; text-align: left; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; }
        .pass-label { font-weight: 700; color: #888; display: block; font-size: 10px; }
        .pass-val { font-size: 15px; color: #000; font-weight: 600; }
        #qrcode { display: flex; justify-content: center; margin: 15px 0; }
        #success-ui { display: none; padding: 50px 30px; text-align: center; }
    </style>
</head>
<body>

    <div class="mantra-header">શ્રી ચંદ્રપ્રભ સ્વામિ ને નમઃ • શ્રી આદિનાથાય નમઃ • નમો નમઃ શ્રી ગુરુ નેમિસૂરયે</div>

    <div class="main-wrapper" id="form-container">
        <div class="hero-banner"><h1>VARSHITAP 2026-27</h1></div>
        <form id="varshitapForm" class="form-section">
            <div class="input-group"><label><span>પૂરું નામ</span> Full Name *</label><input type="text" id="in_name" name="fullName" required></div>
            <div class="input-group"><label><span>મોબાઇલ નંબર</span> Mobile Number *</label><input type="tel" id="in_mobile" name="mobile" pattern="[0-9]{10}" required></div>
            <div class="input-group"><label><span>જન્મ તારીખ</span> Date of Birth *</label><input type="date" name="dob" required></div>
            <div class="input-group"><label><span>ફોર્મ નંબર</span> Form Number *</label><input type="text" id="in_form" name="formNumber" required></div>
            <div class="input-group">
                <label><span>ઋષભ શત્રુંજય તપ</span> Rushabh Shatrunjay Tap *</label>
                <div class="radio-container">
                    <label class="radio-btn"><input type="radio" name="tapType" value="YES" required> YES / હા</label>
                    <label class="radio-btn"><input type="radio" name="tapType" value="NO"> NO / ના</label>
                </div>
            </div>
            <div class="input-group">
                <label><span>સમય પસંદગી</span> Biyashana Slot Selection *</label>
                <select id="in_slot" name="slot" required>
                    <option value="" disabled selected>Select Slot</option>
                    <option value="8.00-8.45 AM (Down)">8.00 to 8.45 AM – Down Sitting</option>
                    <option value="8.00-8.45 AM (Chair)">8.00 to 8.45 AM – Table Chair</option>
                    <option value="9.00-9.45 AM (Down)">9.00 to 9.45 AM – Down Sitting</option>
                    <option value="9.00-9.45 AM (Chair)">9.00 to 9.45 AM – Table Chair</option>
                </select>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Submit & Generate Pass</button>
        </form>
    </div>

    <div class="main-wrapper" id="success-ui">
        <h2>🙏 Registration Successful</h2>
        <p>Your entry pass with a unique QR code is ready.</p>
        <button class="download-btn" id="downloadPass">SAVE PASS TO GALLERY</button>
        <p style="margin-top:20px; font-size: 12px; color: #888; cursor:pointer;" onclick="location.reload()">Submit Another</p>
    </div>

    <div id="pass-preview">
        <div class="pass-header">
            <div style="font-size: 11px; color: #666;">OFFICIAL ENTRY PASS</div>
            <div class="pass-title">VARSHITAP 2026-27</div>
        </div>
        <div id="qrcode"></div> <div class="pass-detail"><span class="pass-label">MEMBER NAME</span><span class="pass-val" id="p_name"></span></div>
        <div class="pass-detail"><span class="pass-label">FORM NUMBER</span><span class="pass-val" id="p_form"></span></div>
        <div class="pass-detail"><span class="pass-label">ALLOCATED SLOT</span><span class="pass-val" id="p_slot" style="color:var(--spiritual-maroon)"></span></div>
        <div style="font-size: 9px; color: #aaa; margin-top: 10px;">Unique Verification Code: <span id="p_id"></span></div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxGqXCN2HtF67ImqlAduW1ooJv5DyRQ_3qdaaNibeeS5tnTSA2bj8si1EhZFabvR__r/exec';
        const form = document.getElementById('varshitapForm');
        
        form.addEventListener('submit', e => {
            e.preventDefault();
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').innerText = "Generating QR...";

            const name = document.getElementById('in_name').value;
            const formNo = document.getElementById('in_form').value;
            const slot = document.getElementById('in_slot').options[document.getElementById('in_slot').selectedIndex].text;

            // 1. Set Pass Text
            document.getElementById('p_name').innerText = name;
            document.getElementById('p_form').innerText = formNo;
            document.getElementById('p_slot').innerText = slot;
            document.getElementById('p_id').innerText = "VT-" + formNo + "-" + Math.floor(Math.random() * 1000);

            // 2. Generate QR Code 
            // This URL will be where volunteers verify the pass
            const verifyURL = `https://your-github-username.github.io/verify?id=${formNo}`;
            document.getElementById('qrcode').innerHTML = ""; // Clear old QR
            new QRCode(document.getElementById("qrcode"), { text: verifyURL, width: 128, height: 128 });

            // 3. Submit to Google Sheets
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(() => {
                    document.getElementById('form-container').style.display = 'none';
                    document.getElementById('success-ui').style.display = 'block';
                });
        });

        document.getElementById('downloadPass').addEventListener('click', () => {
            const pass = document.getElementById('pass-preview');
            pass.style.position = "static";
            pass.style.left = "0";

            html2canvas(pass).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Varshitap_Pass_' + document.getElementById('in_form').value + '.png';
                link.href = canvas.toDataURL();
                link.click();
                pass.style.position = "absolute";
                pass.style.left = "-9999px";
            });
        });
    </script>
</body>
</html>
