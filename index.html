<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varshitap 2026-27</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Noto+Sans+Gujarati:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --spiritual-maroon: #7B1113;
            --soft-ivory: #FCF9F2;
            --accent-gold: #C5A059;
            --text-dark: #333;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--soft-ivory);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
        }

        .content-area { width: 100%; max-width: 600px; }

        .mantra-header {
            text-align: center;
            font-family: 'Noto Sans Gujarati', sans-serif;
            color: var(--spiritual-maroon);
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--accent-gold);
        }

        .main-wrapper {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-top: 8px solid var(--spiritual-maroon);
            overflow: hidden;
        }

        .hero-banner {
            padding: 50px 30px 30px;
            text-align: center;
        }

        h1 { 
            font-family: 'Merriweather', serif; 
            color: var(--spiritual-maroon); 
            font-size: 32px; 
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-section { padding: 0 30px 40px; }

        .input-group { margin-bottom: 25px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        label span {
            display: block;
            font-family: 'Noto Sans Gujarati', sans-serif;
            font-size: 16px;
            color: var(--spiritual-maroon);
            margin-bottom: 4px;
            text-transform: none;
        }

        input[type="text"], input[type="tel"], input[type="date"], select {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 2px solid #EEE;
            font-size: 16px;
            background: transparent;
            outline: none;
            transition: border-color 0.3s;
            color: var(--text-dark);
        }

        input:focus, select:focus { border-bottom-color: var(--accent-gold); }

        .radio-container { display: flex; gap: 15px; margin-top: 10px; }
        .radio-btn { flex: 1; position: relative; }
        .radio-btn input { position: absolute; opacity: 0; cursor: pointer; }
        .radio-label {
            display: block;
            padding: 12px;
            text-align: center;
            border: 1px solid #EEE;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .radio-btn input:checked + .radio-label {
            background: var(--spiritual-maroon);
            color: white;
            border-color: var(--spiritual-maroon);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--spiritual-maroon);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.3s;
        }

        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        #success-ui { 
            display: none; 
            padding: 60px 30px; 
            text-align: center; 
        }

        #success-ui h2 { color: var(--spiritual-maroon); font-family: 'Merriweather', serif; }
    </style>
</head>
<body>

<div class="content-area">
    <div class="mantra-header">
        શ્રી ચંદ્રપ્રભ સ્વામિ ને નમઃ • શ્રી આદિનાથાય નમઃ • નમો નમઃ શ્રી ગુરુ નેમિસૂરયે
    </div>

    <div class="main-wrapper" id="form-container">
        <div class="hero-banner">
            <h1>VARSHITAP 2026-27</h1>
        </div>

        <form id="varshitapForm" class="form-section">
            <div class="input-group">
                <label><span>પૂરું નામ</span> Full Name *</label>
                <input type="text" name="fullName" required>
            </div>

            <div class="input-group">
                <label><span>મોબાઇલ નંબર</span> Mobile Number *</label>
                <input type="tel" name="mobile" pattern="[0-9]{10}" placeholder="10-digit number" required>
            </div>

            <div class="input-group">
                <label><span>જન્મ તારીખ</span> Date of Birth *</label>
                <input type="date" name="dob" required>
            </div>

            <div class="input-group">
                <label><span>ફોર્મ નંબર</span> Form Number *</label>
                <input type="text" name="formNumber" required>
            </div>

            <div class="input-group">
                <label><span>ઋષભ શત્રુંજય તપ</span> Rushabh Shatrunjay Tap *</label>
                <div class="radio-container">
                    <label class="radio-btn">
                        <input type="radio" name="tapType" value="YES" required>
                        <span class="radio-label">YES / હા</span>
                    </label>
                    <label class="radio-btn">
                        <input type="radio" name="tapType" value="NO">
                        <span class="radio-label">NO / ના</span>
                    </label>
                </div>
            </div>

            <div class="input-group">
                <label><span>સમય પસંદગી</span> Biyashana Slot Selection *</label>
                <select name="slot" required>
                    <option value="" disabled selected>Select Slot</option>
                    <option value="8.00-8.45-Down">8.00 to 8.45 AM – Down Sitting</option>
                    <option value="8.00-8.45-Chair">8.00 to 8.45 AM – Table Chair</option>
                    <option value="9.00-9.45-Down">9.00 to 9.45 AM – Down Sitting</option>
                    <option value="9.00-9.45-Chair">9.00 to 9.45 AM – Table Chair</option>
                </select>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Submit Details</button>
        </form>
    </div>

    <div class="main-wrapper" id="success-ui">
        <h2>Recorded Successfully</h2>
        <p>તમારો પ્રતિસાદ રેકોર્ડ કરવામાં આવ્યો છે.</p>
        <p style="color: #666; margin-top: 10px;">Thank you for your submission.</p>
        <button onclick="location.reload()" style="margin-top:20px; cursor:pointer; padding: 10px 20px;">Submit Another Response</button>
    </div>
</div>

<script>
    // Replace this URL if you generate a NEW one from Google Apps Script
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxGqXCN2HtF67ImqlAduW1ooJv5DyRQ_3qdaaNibeeS5tnTSA2bj8si1EhZFabvR__r/exec';
    
    const form = document.getElementById('varshitapForm');
    const btn = document.getElementById('submitBtn');
    const formContainer = document.getElementById('form-container');
    const successUI = document.getElementById('success-ui');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "Submitting...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                formContainer.style.display = 'none';
                successUI.style.display = 'block';
                window.scrollTo(0,0);
            })
            .catch(error => {
                alert("Submission failed. Please check your internet or script permissions.");
                btn.disabled = false;
                btn.innerText = "Submit Details";
            });
    });
</script>
</body>
</html>
