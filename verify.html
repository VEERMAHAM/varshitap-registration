<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Verification</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; width: 100%; max-width: 400px; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #7B1113; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success-icon { font-size: 50px; color: #28a745; margin-bottom: 10px; }
        .error-icon { font-size: 50px; color: #dc3545; margin-bottom: 10px; }
        .info { text-align: left; background: #fff9f0; padding: 15px; border-radius: 8px; margin-top: 20px; border-left: 5px solid #7B1113; }
        h2 { margin: 10px 0; color: #333; }
    </style>
</head>
<body>
    <div class="card">
        <div id="loading-state">
            <div class="loader"></div>
            <p>Verifying with Sangh Database...</p>
        </div>

        <div id="result-state" style="display: none;">
            <div id="icon"></div>
            <h2 id="msg"></h2>
            <div class="info" id="details">
                <p><strong>Name:</strong> <span id="res-name"></span></p>
                <p><strong>Slot:</strong> <span id="res-slot"></span></p>
                <p><strong>Form No:</strong> <span id="res-form"></span></p>
            </div>
            <button onclick="window.close()" style="margin-top:20px; padding: 10px 20px; cursor: pointer;">Close Scanner</button>
        </div>
    </div>

    <script>
        const scriptURL = 'YOUR_NEW_WEB_APP_URL_HERE';
        const urlParams = new URLSearchParams(window.location.search);
        const formId = urlParams.get('id');

        if (formId) {
            fetch(`${scriptURL}?id=${formId}`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('loading-state').style.display = 'none';
                    document.getElementById('result-state').style.display = 'block';
                    
                    if (data.result === 'found') {
                        document.getElementById('icon').innerHTML = "✅";
                        document.getElementById('icon').className = "success-icon";
                        document.getElementById('msg').innerText = "Valid Entry";
                        document.getElementById('res-name').innerText = data.name;
                        document.getElementById('res-slot').innerText = data.slot;
                        document.getElementById('res-form').innerText = formId;
                    } else {
                        document.getElementById('icon').innerHTML = "❌";
                        document.getElementById('icon').className = "error-icon";
                        document.getElementById('msg').innerText = "Pass Not Found";
                        document.getElementById('details').style.display = "none";
                    }
                });
        }
    </script>
</body>
</html>
